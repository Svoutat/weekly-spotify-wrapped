<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1680" viewBox="0 0 1500 1680">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>
  <rect width="1500" height="1680" fill="#ffffff"/>
<text x="70" y="62" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111111" text-anchor="start">UML Activity Diagram - Weekly Spotify Wrapped</text>
  <circle cx="750" cy="110" r="20" fill="#111827"/>
  <rect x="560" y="155" width="380" height="72" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="750" y="191" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Start script</text>
  <text x="750" y="218" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">python main.py</text>
  <line x1="750" y1="130" x2="750" y2="155" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="560" y="265" width="380" height="78" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="750" y="301" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Load and validate .env</text>
  <text x="750" y="328" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">config.py / AppConfig</text>
  <line x1="750" y1="227" x2="750" y2="265" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="750,370 960,440 750,510 540,440" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
  <text x="750" y="430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">Required values</text>
  <text x="750" y="458" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">available?</text>
  <line x1="750" y1="343" x2="750" y2="370" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="105" y="395" width="330" height="82" rx="16" fill="#fef2f2" stroke="#b91c1c" stroke-width="3"/>
  <text x="270" y="431" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Clear config error</text>
  <text x="270" y="458" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">exit code 2</text>
  <line x1="540" y1="440" x2="435" y2="440" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="485" y="422" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="middle">No</text>
  <rect x="560" y="535" width="380" height="78" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="750" y="571" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Initialize SQLite database</text>
  <text x="750" y="598" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">create table and indexes</text>
  <line x1="750" y1="510" x2="750" y2="535" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="780" y="510" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="start">Yes</text>
  <rect x="560" y="650" width="380" height="78" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="750" y="686" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Fetch Last.fm tracks</text>
  <text x="750" y="713" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">last 7 days, paginated API</text>
  <line x1="750" y1="613" x2="750" y2="650" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="750,748 960,815 750,882 540,815" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
  <text x="750" y="806" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">Last.fm request</text>
  <text x="750" y="834" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">successful?</text>
  <line x1="750" y1="728" x2="750" y2="748" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="105" y="775" width="330" height="82" rx="16" fill="#fef2f2" stroke="#b91c1c" stroke-width="3"/>
  <text x="270" y="811" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Log Last.fm error</text>
  <text x="270" y="838" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">exit code 1</text>
  <line x1="540" y1="815" x2="435" y2="815" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="485" y="797" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="middle">No</text>
  <polygon points="750,923 960,990 750,1057 540,990" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
  <text x="750" y="982" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">Spotify credentials</text>
  <text x="750" y="1010" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">available?</text>
  <line x1="750" y1="882" x2="750" y2="923" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="780" y="912" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="start">Yes</text>
  <rect x="1035" y="950" width="335" height="86" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="1202" y="986" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Enrich with Spotify</text>
  <text x="1202" y="1013" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">covers, links, duration</text>
  <line x1="960" y1="990" x2="1035" y2="990" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1000" y="972" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="middle">Yes</text>
  <rect x="560" y="1135" width="380" height="78" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="750" y="1171" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Save tracks in SQLite</text>
  <text x="750" y="1198" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">skip duplicates by UNIQUE rule</text>
  <line x1="750" y1="1058" x2="750" y2="1135" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="785" y="1092" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="start">No or failed</text>
  <path d="M1202 1036 L1202 1174 L940 1174" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="560" y="1250" width="380" height="78" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="750" y="1286" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Calculate weekly statistics</text>
  <text x="750" y="1313" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">top songs, artists, hours</text>
  <line x1="750" y1="1213" x2="750" y2="1250" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="750,1345 960,1410 750,1475 540,1410" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
  <text x="750" y="1402" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">Playlist update</text>
  <text x="750" y="1430" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#111827" text-anchor="middle">enabled?</text>
  <line x1="750" y1="1328" x2="750" y2="1345" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="1035" y="1370" width="335" height="82" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="1202" y="1406" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Try Spotify playlist update</text>
  <text x="1202" y="1433" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">errors are logged, report continues</text>
  <line x1="960" y1="1410" x2="1035" y2="1410" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1000" y="1392" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="middle">Yes</text>
  <rect x="560" y="1525" width="380" height="78" rx="16" fill="#f4f7fb" stroke="#1f2937" stroke-width="3"/>
  <text x="750" y="1561" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Generate and save HTML report</text>
  <text x="750" y="1588" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">output/weekly_spotify_wrapped_*.html</text>
  <line x1="750" y1="1475" x2="750" y2="1525" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="785" y="1496" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4b5563" text-anchor="start">No</text>
  <path d="M1202 1452 L1202 1564 L940 1564" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <circle cx="750" cy="1645" r="21" fill="#ffffff" stroke="#111827" stroke-width="4"/>
  <circle cx="750" cy="1645" r="11" fill="#111827"/>
  <line x1="750" y1="1603" x2="750" y2="1624" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="105" y="1525" width="330" height="78" rx="16" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <text x="270" y="1561" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="middle">Send email if enabled</text>
  <text x="270" y="1588" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4b5563" text-anchor="middle">Gmail SMTP, errors handled</text>
  <path d="M560 1564 L435 1564" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
</svg>
