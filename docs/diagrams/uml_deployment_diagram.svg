<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#ffffff"/>
<text x="70" y="65" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111111" text-anchor="start">UML Deployment Diagram - Weekly Spotify Wrapped</text>
  <rect x="80" y="125" width="560" height="690" rx="22" fill="#f8fafc" stroke="#1f2937" stroke-width="3"/>
  <text x="360" y="165" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#111827" text-anchor="middle">Local Windows Computer</text>
  <rect x="135" y="220" width="450" height="90" rx="14" fill="#eef2ff" stroke="#4338ca" stroke-width="3"/>
  <text x="360" y="257" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Task Scheduler</text>
  <text x="360" y="284" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">optional weekly trigger</text>
  <rect x="135" y="365" width="450" height="90" rx="14" fill="#eef2ff" stroke="#4338ca" stroke-width="3"/>
  <text x="360" y="402" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Python Runtime</text>
  <text x="360" y="429" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">runs main.py and modules</text>
  <rect x="135" y="510" width="450" height="90" rx="14" fill="#eef2ff" stroke="#4338ca" stroke-width="3"/>
  <text x="360" y="547" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Project Files</text>
  <text x="360" y="574" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">source code, tests and docs</text>
  <rect x="135" y="655" width="450" height="90" rx="14" fill="#eef2ff" stroke="#4338ca" stroke-width="3"/>
  <text x="360" y="692" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Local Storage</text>
  <text x="360" y="719" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">.env, SQLite DB, output HTML</text>
  <line x1="360" y1="310" x2="360" y2="365" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="455" x2="360" y2="510" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="600" x2="360" y2="655" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <rect x="850" y="170" width="400" height="95" rx="16" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <text x="1050" y="208" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#111827" text-anchor="middle">Last.fm</text>
  <text x="1050" y="236" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">HTTP API for listening history</text>
  <rect x="850" y="330" width="400" height="95" rx="16" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <text x="1050" y="368" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#111827" text-anchor="middle">Spotify</text>
  <text x="1050" y="396" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">OAuth, metadata and playlist API</text>
  <rect x="850" y="490" width="400" height="95" rx="16" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <text x="1050" y="528" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#111827" text-anchor="middle">Gmail SMTP</text>
  <text x="1050" y="556" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">secure email delivery over SSL</text>
  <rect x="850" y="650" width="400" height="95" rx="16" fill="#ecfdf5" stroke="#047857" stroke-width="3"/>
  <text x="1050" y="688" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#111827" text-anchor="middle">Email Recipient</text>
  <text x="1050" y="716" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#374151" text-anchor="middle">receives weekly HTML report</text>
  <path d="M585 410 C700 380 740 218 850 218" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M585 410 C700 410 740 378 850 378" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M585 410 C710 450 735 538 850 538" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <line x1="1050" y1="585" x2="1050" y2="650" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
</svg>
