<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1100" viewBox="0 0 1200 1100">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>
  <rect width="1200" height="1100" fill="#ffffff"/>
<text x="70" y="72" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#111111" text-anchor="start">ER Diagram - SQLite Database</text>
  <rect x="265" y="135" width="670" height="790" rx="18" fill="#f8fafc" stroke="#111827" stroke-width="3"/>
  <rect x="265" y="135" width="670" height="58" rx="18" fill="#111827"/>
  <text x="600" y="173" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#ffffff" text-anchor="middle">track_plays</text>
  <text x="315" y="245" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="start">PK id : INTEGER</text>
  <text x="315" y="295" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">track_name : TEXT NOT NULL</text>
  <text x="315" y="340" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">artist_name : TEXT NOT NULL</text>
  <text x="315" y="385" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">album_name : TEXT</text>
  <text x="315" y="430" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">played_at : TEXT NOT NULL</text>
  <text x="315" y="475" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">lastfm_url : TEXT</text>
  <text x="315" y="520" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">spotify_track_id : TEXT</text>
  <text x="315" y="565" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">spotify_track_url : TEXT</text>
  <text x="315" y="610" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">spotify_duration_ms : INTEGER</text>
  <text x="315" y="655" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">spotify_album_name : TEXT</text>
  <text x="315" y="700" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">spotify_cover_url : TEXT</text>
  <text x="315" y="745" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">spotify_artist_id : TEXT</text>
  <text x="315" y="790" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">spotify_artist_image_url : TEXT</text>
  <text x="315" y="835" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#111827" text-anchor="start">created_at : TEXT</text>
  <rect x="155" y="970" width="890" height="70" rx="16" fill="#fefce8" stroke="#a16207" stroke-width="3"/>
  <text x="600" y="1015" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#374151" text-anchor="middle">Unique constraint: track_name + artist_name + played_at prevents duplicate track plays.</text>
</svg>
